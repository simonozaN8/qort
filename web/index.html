<!DOCTYPE html>
<html>
<head>
  <base href="$FLUTTER_BASE_HREF">
  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#09090B">
  <title>QORT</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="QORT">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <style>
    html, body {
      margin: 0;
      height: 100%;
      background-color: #09090B;
      padding-bottom: env(safe-area-inset-bottom, 0px);
    }
  </style>
  <script>
    function qortUpdateSafeAreaBottom() {
      var probe = document.createElement('div');
      probe.style.cssText =
        'position:fixed;bottom:0;visibility:hidden;pointer-events:none;' +
        'padding-bottom:env(safe-area-inset-bottom, 0px)';
      document.body.appendChild(probe);
      var bottom = parseFloat(getComputedStyle(probe).paddingBottom) || 0;
      probe.remove();
      document.documentElement.style.setProperty('--qort-safe-bottom', bottom + 'px');
    }
    window.addEventListener('load', qortUpdateSafeAreaBottom);
    window.addEventListener('resize', qortUpdateSafeAreaBottom);
    window.addEventListener('orientationchange', qortUpdateSafeAreaBottom);
  </script>
  <script src="flutter_bootstrap.js" async></script>
</head>
<body>
</body>
</html>
