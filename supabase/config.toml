# Supabase CLI konfigūracija (neprivaloma)
# Diegimas: npm install -g supabase
# Prisijungimas: supabase login
# Link: supabase link --project-ref xrsewjtkxcudvxyxkpti

project_id = "xrsewjtkxcudvxyxkpti"

[api]
enabled = true
port = 54321
schemas = ["public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
major_version = 15

[functions.generate-tournament-images]
enabled = true
verify_jwt = false
import_map = "./functions/generate-tournament-images/deno.json"
# Uncomment to specify a custom file path to the entrypoint.
# Supported file extensions are: .ts, .js, .mjs, .jsx, .tsx
entrypoint = "./functions/generate-tournament-images/index.ts"
# Specifies static files to be bundled with the function. Supports glob patterns.
# For example, if you want to serve static HTML pages in your function:
# static_files = [ "./functions/generate-tournament-images/*.html" ]
